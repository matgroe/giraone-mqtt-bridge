#
#

name: Create Home Assistant App Image
on:
  workflow_dispatch:
     inputs:
      version:
        required: true
        type: string
      image:
        required: true
        type: string
jobs:
  create-homeasstant-image:
    name: Create Home Assistant App-Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout Home Assistant Config Repository
      uses: actions/checkout@v6
      with:
        repository: matgroe/home-assistant-apps
        ref: main
      
    - uses: actions/checkout@v5
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'adopt'
        cache: maven
    
    - name: Update Version String
      run: mvn versions:set -DnewVersion=${{ inputs.version }}
    
    - name: Build with Maven
      run: mvn -DskipTests=true --update-snapshots package
    
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        registry: docker.io
        username: "${{ secrets.DOCKER_LOGIN }}"
        password: "${{ secrets.DOCKER_PAT }}"

    - name: Build and Push the Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          docker.io/${{ inputs.image }}:${{ inputs.version }}
          docker.io/${{ inputs.image }}:latest
        cache-from: type=registry,ref=docker.io/${{ inputs.image }}:buildcache
        cache-to: type=registry,ref=docker.io/${{ inputs.image }}:buildcache,mode=max

    #- run: cat pom.xml
    - run: ls -al .
    
    
