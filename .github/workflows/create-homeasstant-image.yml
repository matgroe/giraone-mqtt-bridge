name: Create Home Assistant App Image
on:
  workflow_dispatch:
     inputs:
      version:
        required: true
        type: string      

jobs:
  create-homeasstant-image:
    name: Update config.yaml
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout Home Assistant Config Repository
      uses: actions/checkout@v6
      with:
        repository: matgroe/home-assistant-apps
        ref: main
      
    - uses: actions/checkout@v5
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'adopt'
        cache: maven
    
    #- name: Update Version String
    #  run: mvn versions:set -DnewVersion=0.1.0-SNAPSHOT
    
    #- name: Build with Maven
    #  run: mvn -DskipTests=true --update-snapshots package
    
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_LOGIN }}
        password: ${{ secrets.DOCKER_PAT }}

    #- run: cat pom.xml
    - run: ls -al target/
    
    
