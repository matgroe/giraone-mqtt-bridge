name: Release for Home Assistant
on:
  workflow_dispatch:
     inputs:
      version:
        required: true
        type: string
jobs:
  create-homeasstant-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    steps:
    - name: Checkout Home Assistant Config Repository
      uses: actions/checkout@v5
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'adopt'
        cache: maven

    - name: Build with Maven
      run: mvn -DskipTests=true --update-snapshots package

    - name: Login '${{ vars.DOCKER_USERNAME }}' at Docker Hub
      uses: docker/login-action@v4
      with:
        registry: docker.io
        username: "${{ vars.DOCKER_USERNAME }}"
        password: "${{ secrets.DOCKER_PAT }}"

    - name: Build and Push the Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          docker.io/${{ vars.DOCKER_USERNAME }}/${{ vars.HOMEASSISTANT_IMAGE_NAME }}:${{ inputs.version }}

  update-homeasstant-config:
    needs: create-homeasstant-image
    name: Update Home Assistant Config
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout Home Assistant App Repository
      uses: actions/checkout@v6
      with:
        repository: matgroe/home-assistant-apps
        ref: main
        token: ${{ secrets.WORKFLOW_TOKEN }}

    - name: Update config.yaml 'version' = ${{ inputs.version }}
      if: inputs.version != ''
      uses: fjogeleit/yaml-update-action@main
      with:
        repository: matgroe/home-assistant-apps
        branch: main
        valueFile: 'giraone-mqtt-bridge/config.yaml'
        changes: |
            {
              "version": "${{ inputs.version }}",
              "image": "${{ vars.DOCKER_USERNAME }}/${{ vars.HOMEASSISTANT_IMAGE_NAME }}:${{ inputs.version }}"
            }
        token: ${{ secrets.WORKFLOW_TOKEN }}
        message: "[BOT] Update version for Release ${{ inputs.version }}"
    - name: Summary
      run: |
        echo "(Home Assistant App Repository)[https://github.com/matgroe/home-assistant-apps] is patched." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY # this is a blank line
        echo "- Patched (config.yaml)[https://github.com/matgroe/home-assistant-apps/blob/main/giraone-mqtt-bridge/config.yaml]" >> $GITHUB_STEP_SUMMARY