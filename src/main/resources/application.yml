application:
  name: giraone-mqtt-bridge

giraone:
  hostname: ${GIRA_SERVER}
  username: ${GIRA_USERNAME}
  password: ${GIRA_PASSWORD}

mqtt:
  broker: ${MQTT_BROKER}
  port: ${MQTT_PORT:1883}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}

logging:
  level:
    root: INFO
    de:
      matgroe: ${LOG_LEVEL:INFO}